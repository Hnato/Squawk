<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squawk - Multiplayer Parrot Game</title>
    <link rel="icon" type="image/x-icon" href="/ico/logo.ico">
    <link rel="apple-touch-icon" href="/img/logo.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121214">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0a0b;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #f8f9fa;
        }
        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(18, 18, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            min-width: 180px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #ui:hover {
            transform: scale(1.02);
        }
        #monitor {
            position: absolute;
            bottom: 24px;
            right: 24px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11px;
            color: #00ff88;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 8px;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #ui h3 {
            margin: 0 0 12px 0;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        #leaderboard div {
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            color: #e9ecef;
            padding-bottom: 4px;
        }
        #auth-modal, #death-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1a1a1c;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .modal-content h2 {
            margin-bottom: 24px;
            background: linear-gradient(135deg, #00ff88 0%, #00bdff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #00ff88;
            outline: none;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00ff88 0%, #00bdff 100%);
            color: #000;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .switch-auth {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        .switch-auth a {
            color: #00ff88;
            text-decoration: none;
            cursor: pointer;
        }
        #error-msg, #death-reason {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 10px;
            height: 18px;
        }
        #stats-panel {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 13px;
        }
        .stat-value {
            color: #00ff88;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="ui">
        <div id="stats-panel">
            <div class="stat-item">
                <span>Gracze online:</span>
                <span id="player-count" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span>Twój wynik:</span>
                <span id="player-score" class="stat-value">0</span>
            </div>
            <!-- <div class="stat-item">
                <span>Jedzonko na mapie:</span>
                <span id="food-count" class="stat-value">0</span>
            </div> -->
        </div>
        <h3>Ranking TOP 10</h3>
        <div id="leaderboard"></div>
        <h3 style="margin-top: 20px;">Rekordy 24h</h3>
        <div id="records-24h"></div>
    </div>

    <div id="monitor">System Online</div>

    <div id="minimap-container" style="position: absolute; bottom: 20px; left: 20px; width: 200px; height: 200px; background: rgba(0,0,0,0.8); border: 2px solid #00ff88; border-radius: 50%; overflow: hidden; pointer-events: none; z-index: 1000; box-shadow: 0 0 20px rgba(0,255,136,0.3);">
        <canvas id="minimap" width="200" height="200"></canvas>
        <div style="position: absolute; bottom: 5px; width: 100%; text-align: center; color: #00ff88; font-size: 10px; font-family: sans-serif; opacity: 0.6;">TAB - Przełącz</div>
    </div>

    <div id="auth-modal">
        <div class="modal-content">
            <h2 id="modal-title">Logowanie</h2>
            <div class="form-group">
                <label>Nazwa użytkownika</label>
                <input type="text" id="username" placeholder="Twoja papuga...">
            </div>
            <div class="form-group">
                <label>Hasło</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div id="error-msg"></div>
            <div class="modal-buttons">
                <button id="auth-btn" class="btn btn-primary">Zaloguj się</button>
            </div>
            <div class="switch-auth">
                <span id="switch-text">Nie masz konta?</span> 
                <a id="switch-link">Zarejestruj się</a>
            </div>
        </div>
    </div>

    <div id="death-modal" style="display: none;">
        <div class="modal-content">
            <h2>Koniec Gry!</h2>
            <div id="death-reason" style="margin-bottom: 20px; font-size: 18px; color: #fff;"></div>
            <div class="stat-item" style="margin-bottom: 20px; font-size: 20px;">
                <span>Twój wynik:</span>
                <span id="final-score" class="stat-value">0</span>
            </div>
            <div class="modal-buttons">
                <button id="play-again-btn" class="btn btn-primary">Zagraj ponownie</button>
                <button id="logout-btn" class="btn btn-secondary">Wyloguj</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
</html>
